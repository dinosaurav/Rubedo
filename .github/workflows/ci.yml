name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Ruff
        run: uv run ruff check src/rubedo/ tests/ examples/

      - name: Pytest
        run: uv run pytest -q

      - name: Mypy
        run: uv run mypy src/rubedo

      - name: Web typecheck
        run: |
          cd web
          npm ci
          npx tsc -b

      - name: Web build (for Playwright)
        run: |
          cd web
          npm run build

      - name: Playwright e2e
        run: |
          cd web
          npx playwright install --with-deps chromium
          npx playwright test
