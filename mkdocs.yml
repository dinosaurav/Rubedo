site_name: Rubedo
site_description: Local-first batch engine - DAG pipelines over keyed collections
site_url: https://rubedo.run/docs/
site_dir: marketing/dist/docs

repo_url: https://github.com/dinosaurav/Rubedo
repo_name: dinosaurav/Rubedo
edit_uri: edit/main/docs/

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: null
            members_order: source
            show_root_heading: true
            show_root_full_path: false
            show_signature_annotations: true
            separate_signature: true
            filters: ["!^_"]

theme:
  name: material
  font: false
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: red
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: red
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.magiclink
  - pymdownx.tasklist:
      custom_checkbox: true
  - def_list
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation & Quickstart: getting-started.md
    - Tutorial: tutorial.md
    - Examples: examples.md
  - Concepts:
    - The Model: concepts/model.md
    - Shapes: concepts/shapes.md
    - Sources: concepts/sources.md
    - Code Changes & Versioning: concepts/versioning.md
  - Guides:
    - Execution Policies: guides/execution-policies.md
    - Search & Invalidation: guides/search-and-invalidation.md
    - Inspecting Runs: guides/inspecting-runs.md
    - Retention & GC: guides/retention.md
  - Reference:
    - Python API:
      - Overview: reference/api/index.md
      - Steps: reference/api/step.md
      - Pipelines: reference/api/pipeline.md
      - Selection & Invalidation: reference/api/selection.md
      - GC & Storage: reference/api/gc.md
    - CLI: reference/cli.md
  - Changelog: changelog.md
  - Development:
    - Contributing: development/contributing.md
    - Invariants: development/invariants.md
    - Producer Model: development/producer-model.md
    - Retention: development/retention.md
