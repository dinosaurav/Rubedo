site_name: Rubedo
site_description: Local-first batch engine - DAG pipelines over keyed collections
site_url: https://rubedo.run/docs/
site_dir: marketing/dist/docs

repo_url: https://github.com/dinosaurav/Rubedo
repo_name: dinosaurav/Rubedo
edit_uri: edit/main/docs/

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            # google so Args/Returns sections render as structured
            # parameter lists (the null style left "Args:" as raw prose,
            # which is why the API pages looked unlike other Python docs).
            docstring_style: google
            docstring_section_style: table
            members_order: source
            show_root_heading: true
            show_root_full_path: false
            show_signature_annotations: true
            separate_signature: true
            show_source: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            merge_init_into_class: true
            filters: ["!^_"]

theme:
  name: material
  font: false
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: red
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: red
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    # No navigation.tabs — top tabs hid the API unless you were already
    # on the Reference tab (left sidebar only showed that section's
    # children). Full tree on the left matches typical Python docs
    # (httpx, pydantic, etc.); page TOC stays on the right.
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - tables
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.magiclink
  - pymdownx.tasklist:
      custom_checkbox: true
  - def_list
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation & Quickstart: getting-started.md
    - Tutorial: tutorial.md
    - Examples: examples.md
  - Concepts:
    - The Model: concepts/model.md
    - Shapes: concepts/shapes.md
    - Sources: concepts/sources.md
    - Code Changes & Versioning: concepts/versioning.md
    - Partial Runs & Sampling: concepts/partial-runs.md
    - Run History & Diff: concepts/run-diff.md
  - Guides:
    - Execution Policies: guides/execution-policies.md
    - Search & Invalidation: guides/search-and-invalidation.md
    - Inspecting Runs: guides/inspecting-runs.md
    - Retention & GC: guides/retention.md
  - API Reference:
    - reference/api/index.md
    - Steps: reference/api/step.md
    - Pipelines: reference/api/pipeline.md
    - Selection & Invalidation: reference/api/selection.md
    - GC & Storage: reference/api/gc.md
  - CLI: reference/cli.md
  - Changelog: changelog.md
  - Development:
    - Contributing: development/contributing.md
    - Invariants: development/invariants.md
    - Producer Model: development/producer-model.md
    - Retention: development/retention.md
