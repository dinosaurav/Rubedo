[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "rubedo"
version = "0.1.0"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "sqlalchemy",
    "pydantic",
    "fastapi",
    "uvicorn",
    "packaging>=26.2",
    "loky>=3.5.6",
    "cloudpickle>=3.1.2",
]

# The examples call real services (Hacker News, GitHub, Open-Meteo, an LLM via
# OpenRouter) using only the standard library — no extra dependencies to install.
# LLM examples read OPENROUTER_API_KEY from a .env file at the repo root.

[tool.setuptools]
packages = ["rubedo"]
package-dir = {"" = "src"}

[tool.pytest.ini_options]
testpaths = ["tests"]

[dependency-groups]
dev = [
    "httpx2>=2.5.0",
    "pytest>=9.1.1",
    "ruff>=0.15.20",
]
