[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "batchbrain"
version = "0.1.0"
dependencies = [
    "sqlalchemy",
    "pydantic",
    "fastapi",
    "uvicorn"
]

[project.scripts]
batchbrain = "batchbrain.cli:main"

[tool.setuptools]
packages = ["batchbrain"]
