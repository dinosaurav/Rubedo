[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "rubedo"
version = "0.1.0"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "sqlalchemy",
    "pydantic",
    "packaging>=26.2",
    "loky>=3.5.6",
    "cloudpickle>=3.1.2",
    "rich>=13.0.0",
]

[project.scripts]
rubedo = "rubedo.cli:main"

[project.optional-dependencies]
server = ["fastapi", "uvicorn"]

# The examples call real services (Hacker News, GitHub, Open-Meteo, an LLM via
# OpenRouter) using only the standard library — no extra dependencies to install.
# LLM examples read OPENROUTER_API_KEY from a .env file at the repo root.

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[dependency-groups]
dev = [
    "httpx2>=2.5.0",
    "litellm>=1.91.0",
    "mkdocs>=1.6.1",
    "mkdocs-material>=9.7.6",
    "mypy>=2.1.0",
    "networkx>=3.6.1",
    "pytest>=9.1.1",
    "ruff>=0.15.20",
    "scipy>=1.17.1",
    "tree-sitter>=0.26.0",
    "tree-sitter-python>=0.25.0",
]

[tool.mypy]
python_version = "3.11"
check_untyped_defs = true
ignore_missing_imports = true
warn_unused_ignores = true
warn_unused_configs = true


