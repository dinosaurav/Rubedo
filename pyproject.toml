[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "batchbrain"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "sqlalchemy",
    "pydantic",
    "fastapi",
    "uvicorn",
    "packaging>=26.2",
]

# The engine core has no LLM/HTTP deps. The examples in examples/ that call
# real services pull them in on demand — install with `uv sync --extra examples`
# or run one off with `uv run --with anthropic python examples/hn_digest.py`.
[project.optional-dependencies]
examples = ["anthropic>=0.40"]

[tool.setuptools]
packages = ["batchbrain"]

[tool.pytest.ini_options]
testpaths = ["tests"]
